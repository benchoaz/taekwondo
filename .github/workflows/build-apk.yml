name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'taekwondo_user_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

# Batalkan otomatis build sebelumnya jika ada commit baru di branch yang sama
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 'any'

      - name: Install Dependencies
        run: |
          cd taekwondo_user_app
          flutter pub get

      - name: Clean Build Cache
        run: |
          cd taekwondo_user_app
          flutter clean
          flutter pub get

      - name: Setup Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | tr -d '\n' | base64 -d > taekwondo_user_app/android/app/key.jks
          echo "$ANDROID_KEYSTORE_BASE64" | tr -d '\n' | base64 -d > taekwondo_user_app/android/key.jks
          cat <<EOF > taekwondo_user_app/android/key.properties
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=key.jks
          EOF

      - name: Build Release APK & AAB
        run: |
          cd taekwondo_user_app
          flutter build apk --release --no-tree-shake-icons
          flutter build appbundle --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: taekwondo-release-apk
          path: taekwondo_user_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: taekwondo-release-aab
          path: taekwondo_user_app/build/app/outputs/bundle/release/app-release.aab
