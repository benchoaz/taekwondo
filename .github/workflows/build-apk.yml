name: Build Android APK

on:
  workflow_dispatch:

# Batalkan otomatis build sebelumnya jika ada commit baru di branch yang sama
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 'any'

      - name: Install Dependencies
        run: |
          cd taekwondo_user_app
          flutter pub get

      - name: Clean Build Cache
        run: |
          cd taekwondo_user_app
          flutter clean
          flutter pub get

      - name: Setup Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE || secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ERROR: ANDROID_KEYSTORE secret is empty."
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n' | base64 --decode > taekwondo_user_app/android/key.jks
          ls -lh taekwondo_user_app/android/key.jks
          mkdir -p taekwondo_user_app/android/app
          cp taekwondo_user_app/android/key.jks taekwondo_user_app/android/app/key.jks
          cat <<EOF > taekwondo_user_app/android/key.properties
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=key.jks
          EOF
          chmod 600 taekwondo_user_app/android/key.jks

      - name: Build Release APK & AAB
        run: |
          cd taekwondo_user_app
          flutter build apk --release --no-tree-shake-icons
          flutter build appbundle --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: taekwondo-release-apk
          path: taekwondo_user_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: taekwondo-release-aab
          path: taekwondo_user_app/build/app/outputs/bundle/release/app-release.aab
