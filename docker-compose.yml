version: '3.8'

services:
  # Database PostgreSQL
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: taekwondo_db
    environment:
      POSTGRES_USER: taekwondo_user
      POSTGRES_PASSWORD: taekwondo_password
      POSTGRES_DB: taekwondo_academy
    volumes:
      - postgres_data:/var/lib/postgresql/data:Z # :Z flag untuk kesesuaian SELinux di Podman
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taekwondo_user -d taekwondo_academy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplikasi Next.js Web
  web:
    build:
      context: ./taekwondo-app
      dockerfile: Containerfile
    container_name: taekwondo_web
    ports:
      - "3030:3030"
    volumes:
      - /home/ubuntu/taekwondo_storage:/app/storage:Z
    environment:
      - DATABASE_URL=postgresql://taekwondo_user:taekwondo_password@postgres:5432/taekwondo_academy?schema=public
      - JWT_SECRET=taekwondo_secret_key_2026_super_secure
      - NODE_ENV=production
      - STORAGE_PATH=/app/storage
      - WAHA_BASE_URL=http://waha:3000
      - WHATSAPP_API_KEY=taekwondo_waha_key_2026_super_secure
    depends_on:
      postgres:
        condition: service_healthy
      waha:
        condition: service_started
    restart: always

  # WhatsApp Gateway (WAHA) - NoWeb Edition for low RAM usage
  waha:
    image: docker.io/devlikeapro/waha:noweb
    container_name: taekwondo_waha
    restart: always
    environment:
      WHATSAPP_API_KEY: taekwondo_waha_key_2026_super_secure
      WHATSAPP_HOOKS: '[{"url": "http://web:3030/api/whatsapp/webhook", "events": ["message", "message.created"]}]'
      # Tidak ada port yang diekspos ke publik untuk keamanan. Hanya bisa diakses secara internal oleh Next.js

volumes:
  postgres_data:
