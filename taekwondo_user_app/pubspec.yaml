name: taekwondo_user_app
description: "Aplikasi Mobile Member untuk Taekwondo Academy"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & Dependency Injection
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Routing
  go_router: ^12.1.1
  
  # API Client
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI & Styling
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  
  # Utility
  intl: ^0.18.1
  url_launcher: ^6.3.2
  geolocator: ^14.0.2
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  image_picker: ^1.2.3
  file_picker: ^8.1.7
  cupertino_icons: ^1.0.8
  video_player: ^2.11.1
  video_compress: ^3.1.4
  timeago: ^3.7.1
  flutter_jailbreak_detection_plus: ^1.10.7
  youtube_player_iframe: ^6.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21 # android min sdk warning

flutter:
  uses-material-design: true

  assets:
    - assets/images/
  #   - assets/icons/
