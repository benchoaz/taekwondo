version: '3.8'

services:
  # Database PostgreSQL
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: taekwondo_db
    environment:
      POSTGRES_USER: taekwondo_user
      POSTGRES_PASSWORD: taekwondo_password
      POSTGRES_DB: taekwondo_academy
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data:Z # :Z flag untuk kesesuaian SELinux di Podman
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taekwondo_user -d taekwondo_academy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplikasi Next.js Web
  web:
    build:
      context: ./taekwondo-app
      dockerfile: Containerfile
    container_name: taekwondo_web
    ports:
      - "80:3030"
    environment:
      - DATABASE_URL=postgresql://taekwondo_user:taekwondo_password@postgres:5432/taekwondo_academy?schema=public
      - JWT_SECRET=taekwondo_secret_key_2026_super_secure
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
