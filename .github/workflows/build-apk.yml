name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 'any'

      - name: Install Dependencies
        run: |
          cd taekwondo_user_app
          flutter pub get

      - name: Clean Build Cache
        run: |
          cd taekwondo_user_app
          flutter clean
          flutter pub get

      - name: Build Release APK
        run: |
          cd taekwondo_user_app
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: taekwondo-release-apk
          path: taekwondo_user_app/build/app/outputs/flutter-apk/app-release.apk
